<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Shining Prince Meets The Knight Errant</title>

  <!-- Description (used by some search engines + as OG fallback) -->
  <meta name="description" content="A sentence of Genji meets a sentence of Quijote. Around a thousand pairs, generated from the openly-available texts on Project Gutenberg." />

  <!-- Favicon — two meeting circles, moss-green Genji + terracotta Quijote -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <!-- Open Graph (for iMessage, Slack, Discord, Bluesky, Facebook, etc.) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="The Shining Prince Meets The Knight Errant" />
  <meta property="og:description" content="A sentence of Genji meets a sentence of Quijote." />
  <meta property="og:image" content="og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter / X card — uses the same image with a richer layout -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The Shining Prince Meets The Knight Errant" />
  <meta name="twitter:description" content="A sentence of Genji meets a sentence of Quijote." />
  <meta name="twitter:image" content="og-image.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #13140f; overflow-x: hidden; }
    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes deplete {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    a:hover { color: #e8c890 !important; }
    button:focus-visible { outline: 1px solid #8a857a; outline-offset: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    (async () => {
      const resp = await fetch('./data/pairs.json');
      const data = await resp.json();
      window.BOOT_APP(data);
    })();
  </script>
</body>
</html>
