<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Shining Prince Meets The Knight Errant</title>
  <style>
    /* Bare-minimum dev-stub styles — not the final design. */
    body {
      font-family: Georgia, 'Times New Roman', serif;
      max-width: 720px;
      margin: 4rem auto;
      padding: 0 1.5rem;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fafaf8;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      color: #555;
      margin-bottom: 2.5rem;
    }

    #loading {
      color: #888;
      font-style: italic;
    }

    #main {
      display: none; /* hidden until data loads */
    }

    #display-text {
      font-size: 1.25rem;
      margin: 0 0 2rem;
    }

    #meta {
      font-size: 0.8rem;
      color: #777;
      margin-bottom: 2rem;
      font-family: 'Courier New', monospace;
    }

    #controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    button {
      padding: 0.4rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
      border: 1px solid #aaa;
      background: #fff;
      border-radius: 3px;
    }

    button:hover:not(:disabled) {
      background: #f0f0ec;
    }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #btn-play-pause {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>The Shining Prince Meets The Knight Errant</h1>

  <p id="loading">Loading sentences&hellip;</p>

  <div id="main">
    <p id="display-text"></p>
    <p id="meta"></p>
    <div id="controls">
      <button id="btn-prev">&#8592; Prev</button>
      <button id="btn-next">Next &#8594;</button>
      <button id="btn-play-pause">&#9654; Play</button>
    </div>
  </div>

  <script type="module">
    import { createQueue } from './queue.js';
    import { createPlayer } from './player.js';
    import { bindKeys } from './keyboard.js';

    // -------------------------------------------------------------------------
    // State
    // -------------------------------------------------------------------------

    let queue = null;
    let player = null;
    // Track whether the player is in "playing" mode independently of the timer,
    // so the UI can reflect intent even between pairs.
    let playing = false;

    // -------------------------------------------------------------------------
    // DOM references
    // -------------------------------------------------------------------------

    const loadingEl = document.getElementById('loading');
    const mainEl = document.getElementById('main');
    const displayTextEl = document.getElementById('display-text');
    const metaEl = document.getElementById('meta');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnPlayPause = document.getElementById('btn-play-pause');

    // -------------------------------------------------------------------------
    // Rendering
    // -------------------------------------------------------------------------

    /**
     * Renders the current pair to the DOM and updates button states.
     *
     * @param {Object} pair - The pair object from sentences.json.
     * @returns {void}
     */
    function render(pair) {
      displayTextEl.textContent = pair.display;

      // Build a compact metadata line from the pair's fields.
      const genjiChapter = pair.genji_meta?.chapter ?? '?';
      const quijoteChapter = pair.quijote_meta?.chapter ?? '?';
      metaEl.textContent =
        `#${pair.id} · mode: ${pair.mode} · Genji ch. ${genjiChapter} · Quixote ch. ${quijoteChapter}`;

      // Prev is only active when there is history to go back to.
      btnPrev.disabled = !queue.hasPrev();

      // Reflect current play/pause state in the button label.
      btnPlayPause.textContent = playing ? '⏸ Pause' : '▶ Play';
    }

    // -------------------------------------------------------------------------
    // Player auto-advance callback
    // -------------------------------------------------------------------------

    /**
     * Called by the player when the timer fires. Advances the queue to the
     * next pair, re-renders, and restarts the player for the new pair if
     * playback is still active.
     *
     * @returns {void}
     */
    function onAdvance() {
      const pair = queue.next();
      render(pair);
      if (playing) {
        // Word count drives the per-pair reading duration.
        player.start(pair.display.split(' ').length);
      }
    }

    // -------------------------------------------------------------------------
    // Control handlers
    // -------------------------------------------------------------------------

    /**
     * Navigates to the next pair. Stops any running timer and resets the
     * playing state (manual navigation interrupts auto-play).
     *
     * @returns {void}
     */
    function handleNext() {
      // Manual skip — pause auto-play so the user stays in control.
      if (playing) {
        playing = false;
        player.stop();
      }
      const pair = queue.next();
      render(pair);
    }

    /**
     * Navigates to the previous pair in history, if available.
     *
     * @returns {void}
     */
    function handlePrev() {
      if (!queue.hasPrev()) return;
      // Manual navigation — pause auto-play.
      if (playing) {
        playing = false;
        player.stop();
      }
      const pair = queue.prev();
      render(pair);
    }

    /**
     * Toggles the player between playing and paused states.
     *
     * @returns {void}
     */
    function handleTogglePlay() {
      if (playing) {
        // Pause: cancel the current timer and update state.
        playing = false;
        player.stop();
        btnPlayPause.textContent = '▶ Play';
      } else {
        // Play: start the timer for the currently displayed pair.
        playing = true;
        const pair = queue.current();
        if (pair) {
          player.start(pair.display.split(' ').length);
        }
        btnPlayPause.textContent = '⏸ Pause';
      }
    }

    // -------------------------------------------------------------------------
    // Initialisation
    // -------------------------------------------------------------------------

    /**
     * Fetches sentences.json, wires up the queue, player, and keyboard
     * bindings, then displays the first pair.
     *
     * @returns {Promise<void>}
     */
    async function init() {
      let data;
      try {
        // sentences.json lives at the repo root, one level above web/.
        const response = await fetch('../sentences.json');
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        data = await response.json();
      } catch (err) {
        loadingEl.textContent = `Failed to load sentences.json: ${err.message}`;
        return;
      }

      const { pairs, meta } = data;
      const windowSize = meta?.window_size ?? 30;

      queue = createQueue(pairs, windowSize);
      // onAdvance handles queue.next() + re-render + player restart.
      player = createPlayer(onAdvance);

      // Wire up button click handlers.
      btnNext.addEventListener('click', handleNext);
      btnPrev.addEventListener('click', handlePrev);
      btnPlayPause.addEventListener('click', handleTogglePlay);

      // Wire up keyboard shortcuts; cleanup is available if we ever need to
      // unmount (not needed for a single-page stub but good practice).
      bindKeys({
        onNext: handleNext,
        onPrev: handlePrev,
        onTogglePlay: handleTogglePlay,
      });

      // Show the main UI and draw the first pair.
      loadingEl.style.display = 'none';
      mainEl.style.display = 'block';

      const firstPair = queue.next();
      render(firstPair);
    }

    init();
  </script>
</body>
</html>
